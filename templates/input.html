{{template "base" .}}
{{define "content"}}
<div class="page-header">
  <h1>➕ Result</h1>
  <p class="subtitle">Input hasil 4D per sesi · Auto-predict sesi berikutnya</p>
</div>

{{if .Error}}<div class="alert alert-error">❌ {{.Error}}</div>{{end}}

<div class="card">
  <form method="POST" action="/input">
    <div class="form-row">
      <div class="form-group">
        <label>📅 Tanggal</label>
        <input type="date" name="tanggal" value="{{.CurrentDate}}" required class="form-input">
      </div>
      <div class="form-group">
        <label>🎯 Sesi</label>
        <select name="sesi" required class="form-input">
          <option value="1">Sesi 1 — 13:00</option>
          <option value="2">Sesi 2 — 16:00</option>
          <option value="3">Sesi 3 — 19:00</option>
          <option value="4">Sesi 4 — 21:00</option>
          <option value="5">Sesi 5 — 23:00</option>
          <option value="6">Sesi 6 — 01:00</option>
        </select>
      </div>
      <div class="form-group">
        <label>🔢 Nomor 4D</label>
        <input type="text" name="nomor" placeholder="1234"
               maxlength="4" pattern="[0-9]{4}" required
               class="form-input nomor-input" inputmode="numeric"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">💾 Simpan</button>
  </form>
</div>

<div class="card">
  <div class="card-title">📋 Input Batch</div>
  <p class="hint" style="margin-bottom:.75rem">Format: <code>YYYY-MM-DD,sesi,nomor4D</code> per baris</p>
  <form method="POST" action="/input-batch">
    <textarea name="batch" rows="5" class="form-input mono"
      placeholder="2026-06-19,1,1234&#10;2026-06-19,2,5678"></textarea>
    <button type="submit" class="btn btn-secondary" style="margin-top:.75rem">📥 Import Batch</button>
  </form>
</div>

<div class="card">
  <div class="card-title">📜 Riwayat Result</div>
  <div class="table-scroll">
    <table class="data-tbl" id="resultTable">
      <thead><tr><th>#</th><th>Tanggal</th><th>Sesi</th><th>4D</th><th>2D</th></tr></thead>
      <tbody id="resultBody">
        <tr><td colspan="5" class="td-center muted">Memuat...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
fetch('/api/results?limit=40')
  .then(r => r.json())
  .then(function(data) {
    var tbody = document.getElementById('resultBody');
    if (!data || !data.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="td-center muted">Belum ada data</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(function(r, i) {
      var d2 = r.Nomor && r.Nomor.length >= 4 ? r.Nomor.slice(2) : '--';
      return '<tr>' +
        '<td class="muted">' + (i+1) + '</td>' +
        '<td>' + r.Tanggal + '</td>' +
        '<td><span class="badge badge-blue">S' + r.Sesi + '</span></td>' +
        '<td><strong class="num4d">' + r.Nomor + '</strong></td>' +
        '<td><span class="badge badge-green">' + d2 + '</span></td>' +
        '</tr>';
    }).join('');
  });
</script>
{{end}}
